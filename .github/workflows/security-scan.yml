name: Weekly Security Scan

on:
  schedule:
    - cron: '0 5 * * 0' # Runs every Sunday at 5 AM UTC
  workflow_dispatch: # Allows manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout
      packages: read # for docker/login-action
      security-events: write # for github/codeql-action/upload-sarif
      actions: write # for triggering rebuild workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:latest
          format: spdx-json
          output-file: "${{ github.event.repository.name }}-sbom.spdx.json"

      - name: Scan SBOM
        id: scan
        uses: anchore/scan-action@v6
        continue-on-error: true
        with:
          sbom: "${{ github.event.repository.name }}-sbom.spdx.json"
          fail-build: false
          # Wolfi base keeps CVE counts near zero, so we can gate on high+.
          severity-cutoff: high
          output-format: "sarif"
          output-file: "grype-results.sarif"

      - name: Upload vulnerability report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'grype-results.sarif'

      - name: Check for critical vulnerabilities
        id: vulncheck
        run: |
          CRITICAL_COUNT=$(jq -r '.runs[0].tool.driver.rules[] | select(.properties.security-severity | tonumber >= 9.0) | .id' grype-results.sarif \
            | sort | uniq > critical_rules.txt \
            && jq -r '.runs[0].results[].ruleId' grype-results.sarif | grep -cf critical_rules.txt || echo 0)
          echo "count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger rebuild to fix vulnerabilities
        if: steps.vulncheck.outputs.found == 'true'
        run: gh workflow run docker-publish.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Fail if critical vulnerabilities remain
        if: steps.vulncheck.outputs.found == 'true'
        run: |
          echo "::error::${{ steps.vulncheck.outputs.count }} critical vulnerability/ies found — rebuild triggered, check docker-publish workflow for result."
          exit 1
